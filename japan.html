        .gallery { column-count: 3; column-gap: 14px; padding: 28px 4%; max-width: 1600px; margin: 0 auto; }
        .gallery-item { break-inside: avoid; -webkit-column-break-inside: avoid; margin-bottom: 14px; cursor: pointer; border-radius: 6px; overflow: hidden; }

        .gallery-item img.loaded { opacity: 1; filter: blur(0); }
        .gallery-item:hover img { transform: scale(1.025); box-shadow: 0 10px 28px rgba(0,0,0,0.18); }
        @media (max-width: 900px) { .gallery { column-count: 2; } }
        @media (max-width: 560px) { .gallery { column-count: 1; } }
        .modal { display: none; position: fixed; inset: 0; background: rgba(12,12,10,0.93); align-items: center; justify-content: center; z-index: 1000; padding: 16px; }
        .modal.open { display: flex; }
        .modal-content { background: #f9f8f6; max-width: 88vw; max-height: 94vh; padding: 20px 24px 22px; border-radius: 8px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); position: relative; overflow: auto; animation: modalIn 0.22s ease; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.97) translateY(6px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .modal-content img { width: 100%; height: auto; max-height: calc(94vh - 110px); object-fit: contain; border-radius: 5px; display: block; }
        .modal-meta { margin-top: 12px; display: flex; align-items: baseline; gap: 10px; }
        .modal-meta h3 { margin: 0; font-family: 'Playfair Display', serif; font-weight: 400; font-size: 1rem; }
        .modal-meta p { margin: 0; font-size: 0.85rem; color: #777; line-height: 1.6; }
        .close { position: absolute; top: 10px; right: 16px; font-size: 1.8rem; line-height: 1; color: #888; cursor: pointer; background: none; border: none; font-family: inherit; transition: color 0.2s; }
        .close:hover { color: #222; }
        .modal-nav { display: flex; justify-content: space-between; margin-top: 12px; }
        .modal-nav button { background: none; border: 1px solid #ddd; border-radius: 4px; padding: 5px 14px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; color: #555; cursor: pointer; transition: all 0.2s; }
        .modal-nav button:hover { background: #222; color: #fff; border-color: #222; }
        .modal-nav button:disabled { opacity: 0.25; pointer-events: none; }
    </style>

            { src: "images/japan/DSC02058.jpg", title: "DSC02058", desc: "" },
        ];
        let currentIndex = 0;
        function loadGallery() {
            const gallery = document.getElementById('gallery');
            photos.forEach((photo, i) => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                const img = document.createElement('img');
                img.alt = photo.title; img.loading = 'lazy'; img.decoding = 'async';
                img.onload = () => img.classList.add('loaded');
                img.onerror = () => img.classList.add('loaded');
                img.onclick = () => showModal(i);
                img.src = photo.src;
                item.appendChild(img); gallery.appendChild(item);
            });
        }
        function showModal(index) {
            currentIndex = index;
            const p = photos[index];
            document.getElementById('modalImg').src = p.src;
            document.getElementById('modalImg').alt = p.title;
            document.getElementById('modalTitle').textContent = p.title;
            document.getElementById('modalDesc').textContent = p.desc;
            document.getElementById('prevBtn').disabled = index === 0;
            document.getElementById('nextBtn').disabled = index === photos.length - 1;
            document.getElementById('modal').classList.add('open');
            document.body.style.overflow = 'hidden';
        }
        function closeModal() { document.getElementById('modal').classList.remove('open'); document.body.style.overflow = ''; }
        function navigateModal(dir) { const n = currentIndex + dir; if (n >= 0 && n < photos.length) showModal(n); }
        document.addEventListener('keydown', e => {
            if (!document.getElementById('modal').classList.contains('open')) return;
            if (e.key === 'Escape') closeModal();
            if (e.key === 'ArrowLeft') navigateModal(-1);
            if (e.key === 'ArrowRight') navigateModal(1);
        });
        window.onload = loadGallery;
