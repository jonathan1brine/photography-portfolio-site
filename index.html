<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonathan's Photography</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500&display=swap');

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: #ffffff;
            color: #222;
            margin: 0;
            padding: 0;
        }
        header {
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .selfie {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            margin: 0;
            font-size: 2.4rem;
            font-weight: 400;
            letter-spacing: -0.5px;
        }
        nav a {
            color: #222;
            text-decoration: none;
            margin-left: 2rem;
            font-size: 1.1rem;
            font-weight: 500;
        }
        nav a:hover { color: #d4a017; }

        main {
            max-width: 1200px;
            margin: 5rem auto;
            padding: 0 5%;
        }
        h2 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 3rem;
            font-weight: 400;
        }
        .series-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 2.5rem;
        }
        .series-card {
            text-decoration: none;
            color: inherit;
        }
        .series-card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 1rem;
        }
        .series-card h3 {
            font-family: 'Playfair Display', serif;
            margin: 0 0 0.3rem 0;
            font-size: 1.55rem;
        }
        .series-card p {
            margin: 0;
            color: #666;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <img src="DSC01669.jpg" alt="Jonathan" class="selfie">
            <h1>Jonathan's Photography</h1>
        </div>
        <nav>
            <a href="index.html">Works</a>
            <a href="mailto:jonathan1brine@gmail.com">Contact</a>
        </nav>
    </header>

    <main>
        <h2>Photo Series</h2>
        
        <div class="series-grid">
            <a href="japan.html" class="series-card">
                <img src="images/japan/1.jpg" alt="Japan">
                <h3>Japan • April 2025</h3>
                <p>Tokyo & Kyoto street scenes</p>
            </a>
            
            <a href="#" class="series-card">
                <img src="https://picsum.photos/id/1016/800/600" alt="Sydney">
                <h3>Sydney • February 2026</h3>
                <p>Harbour and coastal light</p>
            </a>
            
            <a href="#" class="series-card">
                <img src="https://picsum.photos/id/133/800/600" alt="Adelaide Hills">
                <h3>Adelaide Hills • November 2025</h3>
                <p>Autumn mist and landscapes</p>
            </a>
        </div>
    </main>
</body>
</html>
