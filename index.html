<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonathan's Photography</title>
    <style>
        body {
            font-family: Georgia, serif;
            background-color: #f5f0e8; /* vintage paper / off-white */
            color: #333;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        header {
            background-color: #2c2c2c;
            color: white;
            padding: 3rem 2rem;
            text-align: center;
        }
        h1 {
            font-size: 2.8rem;
            margin: 0;
            letter-spacing: 2px;
        }
        nav a {
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            margin: 0 1rem;
        }
        nav a:hover {
            color: #d4a017;
        }
        main {
            max-width: 1100px;
            margin: 3rem auto;
            padding: 0 2rem;
        }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }
        .polaroid {
            background: white;
            padding: 12px 12px 40px;
            border: 12px solid #f5f0e8;
            box-shadow: 10px 10px 15px rgba(0,0,0,0.15);
            transition: transform 0.3s ease;
            cursor: pointer;
        }
        .polaroid:hover {
            transform: rotate(2deg) scale(1.03);
        }
        .polaroid img {
            width: 100%;
            height: auto;
            display: block;
        }
        .polaroid h3 {
            margin: 15px 0 5px;
            font-size: 1.3rem;
            text-align: center;
            color: #444;
        }
        .polaroid p {
            text-align: center;
            font-size: 0.95rem;
            color: #666;
            margin: 0;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            max-width: 800px;
            width: 90%;
            padding: 20px;
            border: 15px solid #f5f0e8;
            box-shadow: 15px 15px 20px rgba(0,0,0,0.3);
            position: relative;
        }
        .modal-content img {
            width: 100%;
            height: auto;
        }
        .modal-content h3 {
            margin: 15px 0 10px;
        }
        .close {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 2rem;
            cursor: pointer;
            color: #333;
        }
    </style>
</head>
<body>
    <header>
        <h1>Jonathan's Photography</h1>
        <nav>
            <a href="#series">Series</a>
            <a href="mailto:jonathan1brine@gmail.com">Contact Me</a>
        </nav>
    </header>

    <main>
        <section id="series">
            <h2 style="text-align:center; margin-bottom:2rem; font-size:1.8rem;">Photo Series</h2>
            
            <div class="photo-grid" id="photoGrid">
                <!-- Photos will be added here by JavaScript -->
            </div>
        </section>
    </main>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <img id="modalImage" src="" alt="">
            <h3 id="modalTitle"></h3>
            <p id="modalDesc"></p>
        </div>
    </div>

    <footer style="text-align:center; padding:2rem; color:#777;">
        © 2026 Jonathan Brine • All photographs are my own
    </footer>

    <script>
        const photos = [
            {
                src: "https://picsum.photos/id/1015/800/600",
                title: "Japan • April 2025",
                desc: "Early morning in Kyoto. The cherry blossoms were just starting to fall and the light was perfect."
            },
            {
                src: "https://picsum.photos/id/1016/800/600",
                title: "Sydney • February 2026",
                desc: "Golden hour at the harbour. The water was glassy and the Opera House looked incredible in the warm light."
            },
            {
                src: "https://picsum.photos/id/133/800/600",
                title: "Adelaide Hills • November 2025",
                desc: "Misty autumn morning in the hills. The colours were changing fast and it felt like the whole landscape was breathing."
            },
            {
                src: "https://picsum.photos/id/201/800/600",
                title: "Tokyo Streets • April 2025",
                desc: "Rainy night in Shibuya. The reflections on the wet pavement made everything feel cinematic."
            }
        ];

        function createPhotoGrid() {
            const grid = document.getElementById('photoGrid');
            photos.forEach((photo, index) => {
                const div = document.createElement('div');
                div.className = 'polaroid';
                div.innerHTML = `
                    <img src="${photo.src}" alt="${photo.title}">
                    <h3>${photo.title}</h3>
                `;
                div.onclick = () => openModal(photo);
                grid.appendChild(div);
            });
        }

        function openModal(photo) {
            document.getElementById('modalImage').src = photo.src;
            document.getElementById('modalTitle').textContent = photo.title;
            document.getElementById('modalDesc').textContent = photo.desc;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        // Initialize the grid when page loads
        window.onload = createPhotoGrid;
    </script>
</body>
</html>
