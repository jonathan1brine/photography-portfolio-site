<body>
    <header class="gallery-page-header">
        <a href="portfolio.html" class="back">&larr; Portfolio</a>
        <div class="gallery-header-title">
            <h1>Adelaide</h1>
            <small>2024&ndash;Present</small>
        </div>
        <span class="photo-count" id="photoCount"></span>
    </header>

    <div class="gallery" id="gallery"></div>

    <div class="modal" id="modal" onclick="if(event.target===this)closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close" onclick="closeModal()" aria-label="Close lightbox">&times;</button>
            <img id="modalImg" src="" alt="">
            <div class="modal-meta">
                <h3 id="modalTitle"></h3>
                <p id="modalDesc"></p>
            </div>
            <div class="modal-nav">
                <button id="prevBtn" onclick="navigateModal(-1)" aria-label="Previous photo">&larr; prev</button>
                <span id="modalCounter" class="modal-counter"></span>
                <button id="nextBtn" onclick="navigateModal(1)" aria-label="Next photo">next &rarr;</button>
            </div>
        </div>
    </div>

    <button id="scrollTopBtn" class="scroll-top-btn" aria-label="Scroll to top">&#8593;</button>

    <script src="js/gallery.js"></script>
    <script>
        // Adelaide order is intentional — curated, not sorted by date.
        const photos = [
            { src: "images/adelaide/DSC00925.jpg", title: "DSC00925", desc: "My pet bird Charlie waiting by the door — a habit he has of sitting there until I let him in." },
            { src: "images/adelaide/DSC00950.jpg", title: "DSC00950", desc: "" },

            { src: "images/adelaide/DSC02439.jpg", title: "DSC02439", desc: "" },
        ];

        initGallery(photos);
    </script>
</body>
</html>
